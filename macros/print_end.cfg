[gcode_macro END_PRINT]
gcode:
    {% set z_safe = [printer.toolhead.position.z + 20,
                     printer.toolhead.axis_maximum.z - 2] | min %}

    M140 S0 					; Turn off bed
    M104 S0 					; Turn off nozzle
    M107                        ; part fan off
    
    G91 						; Relative positioning
    G1 E-4 F2700                ; retract (matches ADAPTIVE_LINE_PURGE tip_distance)
    G90 						; Absolute positioning
    G1 Z{z_safe} F1200          ; lift, clamped to max Z
    G1 X0 Y220 F3000 			; Present the finished print by moving bed forward

    BED_MESH_CLEAR
    M84 						; Disable steppers
