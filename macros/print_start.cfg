[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}

	CLEAR_PAUSE
    BED_MESH_CLEAR              		; before calibrating
    SET_GCODE_OFFSET Z=0        		; clear leftover babystepping from the last print
    M220 S100                   		; reset speed factor
    M221 S100                   		; reset flow factor
    M107                        		; part fan off during heat-up
    
    G90 								; Use absolute coordinates
    M140 S{BED_TEMP} 					; Start heating bed
    M104 S150 							; Pre-heat nozzle to 150C (prevents oozing during probing)
    G28 								; Home all axes
    
    M190 S{BED_TEMP} 					; Wait for bed to reach temperature
    BED_MESH_CALIBRATE ADAPTIVE=1 		; Start Adaptive Bed Leveling 

    G0 X1 Y1 Z5 F5000               	; park out of the way to finish heating
    M104 S{EXTRUDER_TEMP}
    M109 S{EXTRUDER_TEMP} 				; Wait for nozzle to reach printing temperature

    ADAPTIVE_LINE_PURGE             	; purge next to the actual print
